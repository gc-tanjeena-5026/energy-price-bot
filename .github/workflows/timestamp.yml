name: Maira All-City Energy Sync
on:
  schedule:
    - cron: "25 * * * *" # Runs every hour at :25
  workflow_dispatch: # Allows you to run it manually from the Actions tab

jobs:
  sync-data:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests pandas

      - name: Fetch JEPX and Push to Maira
        env:
          MAIRA_API_KEY: ${{ secrets.MAIRA_API_KEY }}
          MAIRA_PROJECT_KEY: ${{ secrets.MAIRA_PROJECT_KEY }}
          MAIRA_DATASET_ID: ${{ secrets.MAIRA_DATASET_ID }}
        run: |
          python - <<EOF
          import requests
          import pandas as pd
          import io
          import os

          # 1. DOWNLOAD JEPX RAW DATA
          url = "https://www.jepx.jp/market/excel/spot_2026.csv"
          try:
              df = pd.read_csv(url, encoding='shift_jis')
          except Exception as e:
              print(f"Download failed: {e}")
              exit(1)
          
          # 2. FORMAT DATA FOR TIME-SERIES (Last 48 records = 24 hours)
          latest_data = df.tail(48).copy()
          
          def get_iso_time(row):
              # Converts JEPX date/slot to ISO-8601 (e.g., 2026-04-27T10:00:00Z)
              date_part = row.iloc[0].replace('/', '-')
              slot = int(row.iloc[1])
              h = (slot - 1) // 2
              m = "00" if slot % 2 != 0 else "30"
              return f"{date_part}T{h:02}:{m}:00Z"

          latest_data['timestamp'] = latest_data.apply(get_iso_time, axis=1)
          
          # 3. PREPARE THE MULTI-CITY TABLE
          # JEPX Column mapping: Hokkaido(4), Tokyo(11), Kansai(14), Kyushu(19)
          final_df = pd.DataFrame({
              "timestamp": latest_data['timestamp'],
              "tokyo": latest_data.iloc[:, 11].astype(float),
              "kansai": latest_data.iloc[:, 14].astype(float),
              "hokkaido": latest_data.iloc[:, 4].astype(float),
              "kyushu": latest_data.iloc[:, 19].astype(float)
          })

          # 4. CONVERT TO CSV BUFFER
          csv_buf = io.BytesIO()
          final_df.to_csv(csv_buf, index=False)
          csv_buf.seek(0)

          # 5. API CALL TO MAIRA (Time-Series Endpoint)
          dataset_id = os.environ['MAIRA_DATASET_ID']
          api_url = f"https://api.recommender.gigalogy.com/v1/gpt/datasets_ts/{dataset_id}/file"
          
          # Maira strictly requires 'api-key' and 'project-key' headers
          headers = {
              "api-key": os.environ['MAIRA_API_KEY'],
              "project-key": os.environ['MAIRA_PROJECT_KEY']
          }
          
          # 'dataset_file' is the specific key Maira expects for the file upload
          files = {'dataset_file': ('energy_update.csv', csv_buf, 'text/csv')}
          
          print(f"Attempting to push to Dataset ID: {dataset_id}")
          response = requests.put(api_url, headers=headers, files=files)
          
          if response.status_code == 200:
              print(f"Successfully synced {len(final_df)} rows for all cities!")
          else:
              print(f"Sync Failed. Status: {response.status_code}")
              print(f"Response: {response.text}")
          EOF
