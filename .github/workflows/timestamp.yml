name: Maira All-City Energy Sync
on:
  schedule:
    - cron: "25 * * * *" # Runs every hour at :25
  workflow_dispatch: 

jobs:
  sync-data:
    runs-on: ubuntu-latest
    steps:
      - name: Install Dependencies
        run: pip install requests pandas

      - name: Fetch and Push to Maira
        env:
          MAIRA_API_KEY: ${{ secrets.MAIRA_API_KEY }}
          DATASET_ID: ${{ secrets.MAIRA_DATASET_ID }}
        run: |
          python - <<EOF
          import requests
          import pandas as pd
          import io
          import os

          # 1. Fetch JEPX Data
          url = "https://www.jepx.jp/market/excel/spot_2026.csv"
          df = pd.read_csv(url, encoding='shift_jis')
          
          # 2. Format Time-Series (Last 48 records = 24 hours)
          latest_data = df.tail(48).copy()
          def to_iso(row):
              d, s = row.iloc[0].replace('/', '-'), int(row.iloc[1])
              return f"{d}T{(s-1)//2:02}:{'00' if s%2!=0 else '30'}:00Z"

          latest_data['timestamp'] = latest_data.apply(to_iso, axis=1)
          
          # 3. Create the multi-city table
          # Column mapping: Hokkaido(4), Tokyo(11), Kansai(14), Kyushu(19)
          final_df = pd.DataFrame({
              "timestamp": latest_data['timestamp'],
              "tokyo": latest_data.iloc[:, 11].astype(float),
              "kansai": latest_data.iloc[:, 14].astype(float),
              "hokkaido": latest_data.iloc[:, 4].astype(float),
              "kyushu": latest_data.iloc[:, 19].astype(float)
          })

          # 4. Push to Maira Time-Series API
          csv_buf = io.BytesIO()
          final_df.to_csv(csv_buf, index=False)
          csv_buf.seek(0)

          api_url = f"https://api.recommender.gigalogy.com/v1/gpt/datasets_ts/{os.environ['DATASET_ID']}/file"
          headers = {"Authorization": f"Bearer {os.environ['MAIRA_API_KEY']}"}
          
          # 'dataset_file' is the key Maira's API expects for the upload
          files = {'dataset_file': ('energy.csv', csv_buf, 'text/csv')}
          response = requests.put(api_url, headers=headers, files=files)
          
          print(f"Status: {response.status_code} | Response: {response.text}")
          EOF
