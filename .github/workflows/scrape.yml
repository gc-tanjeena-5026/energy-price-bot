name: Live Hourly Energy Scraper
on:
  schedule:
    - cron: "0 * * * *" 
  workflow_dispatch: 

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run API-Direct Scraper
        run: |
          python - <<EOF
          import requests
          import json
          import datetime

          # Mapping regional IDs used by the website's internal data source
          # 1: Hokkaido, 2: Tohoku, 3: Tokyo, 4: Chubu, 5: Hokuriku, 6: Kansai, 7: Chugoku, 8: Shikoku, 9: Kyushu
          region_map = {
              "1": "Hokkaido", "2": "Tohoku", "3": "Tokyo", "4": "Chubu", 
              "5": "Hokuriku", "6": "Kansai", "7": "Chugoku", "8": "Shikoku", "9": "Kyushu"
          }
          
          all_data = []
          now = datetime.datetime.now()
          date_str = now.strftime("%Y-%m-%d")

          for r_id, r_name in region_map.items():
              try:
                  # Targeting the internal data endpoint directly
                  api_url = f"https://kankyo-ichiba.jp/api/get-area-price?area={r_id}&date={date_str}"
                  res = requests.get(api_url, headers={'User-Agent': 'Mozilla/5.0'}, timeout=15)
                  data = res.json()
                  
                  if data and 'prices' in data:
                      hourly_list = []
                      for entry in data['prices']:
                          hourly_list.append({
                              "time": entry.get('time'),
                              "price": float(entry.get('price', 0))
                          })
                      
                      avg_price = sum(d['price'] for d in hourly_list) / len(hourly_list) if hourly_list else 0
                      
                      all_data.append({
                          "area": r_name,
                          "daily_avg": round(avg_price, 2),
                          "hourly_data": hourly_list
                      })
                      print(f"API Success: {r_name}")
              except Exception as e:
                  print(f"API Failed for {r_name}: {e}")

          output = {
              "last_updated": now.strftime("%Y-%m-%d %H:%M:%S UTC"),
              "regions": all_data
          }

          with open('data.json', 'w') as f:
              json.dump(output, f, indent=2)
          EOF

      - name: Push to Gist
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          CONTENT=$(cat data.json | python3 -c "import json,sys; print(json.dumps(sys.stdin.read()))")
          curl -L -X PATCH \
            -H "Authorization: Bearer $GIST_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/gists/959b168e741d4df3e091b8b841365476" \
            -d "{\"files\":{\"hokkaido.json\":{\"content\":$CONTENT}}}"
