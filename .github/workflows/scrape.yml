name: Live Hourly Energy Scraper
on:
  schedule:
    - cron: "0 * * * *" 
  workflow_dispatch: 

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Scraper Tools
        run: pip install requests beautifulsoup4

      - name: Run Hourly Scraper
        run: |
          python - <<EOF
          import requests
          from bs4 import BeautifulSoup
          import json
          import datetime

          regions = ["hokkaido", "tohoku", "tokyo", "chubu", "hokuriku", "kansai", "chugoku", "shikoku", "kyushu"]
          all_data = []

          for r in regions:
              try:
                  url = f"https://kankyo-ichiba.jp/{r}"
                  res = requests.get(url, headers={'User-Agent': 'Mozilla/5.0'}, timeout=10)
                  soup = BeautifulSoup(res.text, 'html.parser')
                  
                  # 1. Get the Daily Average (Solving the 15.0 issue)
                  avg_tag = soup.find('dl', class_='total-average')
                  avg_val = float(avg_tag.find('dd').text.replace('円/kWh', '').strip()) if avg_tag else 0.0

                  # 2. Get the Hourly Table
                  hourly_prices = []
                  table = soup.find('table', class_='area-price-table')
                  if table:
                      rows = table.find_all('tr')[1:] # Skip header
                      for row in rows:
                          cols = row.find_all('td')
                          if len(cols) >= 2:
                              time_range = cols[0].text.strip()
                              price = float(cols[1].text.replace('円', '').strip())
                              hourly_prices.append({"time": time_range, "price": price})
                  
                  all_data.append({
                      "area": r.capitalize(),
                      "daily_avg": avg_val,
                      "hourly_data": hourly_prices
                  })
              except Exception as e:
                  print(f"Error on {r}: {e}")
              
          output = {
              "last_updated": datetime.datetime.now().strftime("%Y-%m-%d %H:%M:%S UTC"),
              "regions": all_data
          }

          with open('data.json', 'w') as f:
              json.dump(output, f, indent=2)
          EOF

      - name: Push to Gist
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          CONTENT=$(cat data.json | python3 -c "import json,sys; print(json.dumps(sys.stdin.read()))")
          curl -L -X PATCH \
            -H "Authorization: Bearer $GIST_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/gists/959b168e741d4df3e091b8b841365476" \
            -d "{\"files\":{\"hokkaido.json\":{\"content\":$CONTENT}}}"
