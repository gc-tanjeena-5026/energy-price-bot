name: Live Hourly Energy Scraper
on:
  schedule:
    - cron: "0 * * * *" 
  workflow_dispatch: 

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Scraper Tools
        run: pip install requests beautifulsoup4

      - name: Run Hourly Scraper
        run: |
          python - <<EOF
          import requests
          from bs4 import BeautifulSoup
          import json
          import datetime

          # Fixed region list for the actual website URLs
          regions = ["hokkaido", "tohoku", "tokyo", "chubu", "hokuriku", "kansai", "chugoku", "shikoku", "kyushu"]
          all_data = []

          headers = {'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'}

          for r in regions:
              try:
                  url = f"https://kankyo-ichiba.jp/{r}"
                  res = requests.get(url, headers=headers, timeout=15)
                  soup = BeautifulSoup(res.text, 'html.parser')
                  
                  # Look for the average price in the bold display
                  price_box = soup.select_one('dl.total-average dd')
                  avg_val = float(price_box.get_text(strip=True).replace('円/kWh', '')) if price_box else 0.0

                  # Grab the hourly table data
                  hourly_list = []
                  table_rows = soup.select('table.area-price-table tr')
                  for row in table_rows:
                      cols = row.find_all('td')
                      if len(cols) >= 2:
                          time_text = cols[0].get_text(strip=True)
                          price_text = cols[1].get_text(strip=True).replace('円', '')
                          try:
                              hourly_list.append({"time": time_text, "price": float(price_text)})
                          except:
                              continue
                  
                  all_data.append({
                      "area": r.capitalize(),
                      "daily_avg": avg_val,
                      "hourly_data": hourly_list
                  })
                  print(f"Successfully scraped {r}")
              except Exception as e:
                  print(f"Failed {r}: {e}")
              
          output = {
              "last_updated": datetime.datetime.now().strftime("%Y-%m-%d %H:%M:%S UTC"),
              "data_source": "Kankyo-Ichiba Live",
              "regions": all_data
          }

          with open('data.json', 'w') as f:
              json.dump(output, f, indent=2)
          EOF

      - name: Push to Gist
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          CONTENT=$(cat data.json | python3 -c "import json,sys; print(json.dumps(sys.stdin.read()))")
          curl -L -X PATCH \
            -H "Authorization: Bearer $GIST_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/gists/959b168e741d4df3e091b8b841365476" \
            -d "{\"files\":{\"hokkaido.json\":{\"content\":$CONTENT}}}"
