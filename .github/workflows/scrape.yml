name: Live Hourly Energy Scraper
on:
  schedule:
    - cron: "0 * * * *" 
  workflow_dispatch: 

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Brute-Force Scraper
        run: |
          python - <<EOF
          import requests
          import json
          import datetime
          import re

          regions = ["hokkaido", "tohoku", "tokyo", "chubu", "hokuriku", "kansai", "chugoku", "shikoku", "kyushu"]
          all_data = []
          now = datetime.datetime.now()

          for r in regions:
              try:
                  url = f"https://kankyo-ichiba.jp/{r}"
                  res = requests.get(url, headers={'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64)'}, timeout=15)
                  html = res.text
                  
                  # Search for the average price pattern (e.g., 15.23) near '平均単価'
                  # This avoids needing to know the exact HTML tag
                  avg_match = re.search(r'全時間帯の平均単価.*?([\d.]+)', html, re.DOTALL)
                  avg_price = float(avg_match.group(1)) if avg_match else 0.0

                  # Find all prices in the table (usually looks like 12.34円)
                  prices = re.findall(r'([\d.]+)\s*円/kWh', html)
                  
                  hourly_list = []
                  if prices:
                      # The first 48 matches are usually the half-hour blocks for the day
                      for i, p in enumerate(prices[:48]):
                          hour = i // 2
                          mins = "00" if i % 2 == 0 else "30"
                          hourly_list.append({"time": f"{hour}:{mins}", "price": float(p)})

                  if avg_price > 0 or hourly_list:
                      all_data.append({
                          "area": r.capitalize(),
                          "avg_price": avg_price,
                          "hourly_data": hourly_list
                      })
                      print(f"Brute force success for {r}")
              except Exception as e:
                  print(f"Failed {r}: {e}")

          output = {"last_updated": now.strftime("%Y-%m-%d %H:%M:%S UTC"), "regions": all_data}
          with open('data.json', 'w') as f:
              json.dump(output, f, indent=2)
          EOF

      - name: Push to Gist
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          CONTENT=$(cat data.json | python3 -c "import json,sys; print(json.dumps(sys.stdin.read()))")
          curl -L -X PATCH \
            -H "Authorization: Bearer $GIST_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/gists/959b168e741d4df3e091b8b841365476" \
            -d "{\"files\":{\"hokkaido.json\":{\"content\":$CONTENT}}}"
