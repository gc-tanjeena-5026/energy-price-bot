name: Live Hourly Energy Scraper
on:
  schedule:
    - cron: "0 * * * *" 
  workflow_dispatch: 

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Scraper Tools
        run: pip install requests beautifulsoup4

      - name: Run Hourly Scraper
        run: |
          python - <<EOF
          import requests
          from bs4 import BeautifulSoup
          import json
          import datetime
          import re

          regions = ["hokkaido", "tohoku", "tokyo", "chubu", "hokuriku", "kansai", "chugoku", "shikoku", "kyushu"]
          all_data = []

          # Advanced headers to look like a real human browsing
          headers = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
              'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8',
              'Accept-Language': 'ja,en-US;q=0.7,en;q=0.3',
          }

          for r in regions:
              try:
                  url = f"https://kankyo-ichiba.jp/{r}"
                  session = requests.Session()
                  res = session.get(url, headers=headers, timeout=20)
                  soup = BeautifulSoup(res.text, 'html.parser')
                  
                  # 1. Smarter Daily Average Search
                  # We search for any text containing "平均単価" and get the number after it
                  avg_val = 0.0
                  text_content = soup.get_text()
                  match = re.search(r'全時間帯の平均単価\s*([\d.]+)', text_content)
                  if match:
                      avg_val = float(match.group(1))

                  # 2. Hourly Table Search
                  # The table usually has a class like 'area-price-table' or 'price-table'
                  hourly_list = []
                  table = soup.find('table', class_=re.compile(r'.*price.*table.*'))
                  if table:
                      rows = table.find_all('tr')
                      for row in rows:
                          cols = row.find_all(['td', 'th'])
                          if len(cols) >= 2:
                              time_text = cols[0].get_text(strip=True)
                              # Clean up text like "00:00 - 00:30" or "0時"
                              if any(char.isdigit() for char in time_text):
                                  price_raw = cols[1].get_text(strip=True).replace('円', '').replace(',', '')
                                  try:
                                      hourly_list.append({"time": time_text, "price": float(price_raw)})
                                  except:
                                      continue
                  
                  if avg_val > 0 or len(hourly_list) > 0:
                      all_data.append({
                          "area": r.capitalize(),
                          "daily_avg": avg_val,
                          "hourly_data": hourly_list
                      })
                      print(f"Success: Found data for {r}")
                  else:
                      print(f"Warning: Page loaded for {r} but no data found in tags.")

              except Exception as e:
                  print(f"Critical Error on {r}: {str(e)}")
              
          output = {
              "last_updated": datetime.datetime.now().strftime("%Y-%m-%d %H:%M:%S UTC"),
              "data_source": "Kankyo-Ichiba Actual",
              "regions": all_data
          }

          with open('data.json', 'w') as f:
              json.dump(output, f, indent=2)
          EOF

      - name: Push to Gist
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          CONTENT=$(cat data.json | python3 -c "import json,sys; print(json.dumps(sys.stdin.read()))")
          curl -L -X PATCH \
            -H "Authorization: Bearer $GIST_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/gists/959b168e741d4df3e091b8b841365476" \
            -d "{\"files\":{\"hokkaido.json\":{\"content\":$CONTENT}}}"
