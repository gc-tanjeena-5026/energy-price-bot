name: Live All-Japan Energy Scraper
on:
  schedule:
    - cron: "0 * * * *" 
  workflow_dispatch: 

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Scraper Tools
        run: pip install requests beautifulsoup4

      - name: Run All-Region Scraper
        run: |
          python - <<EOF
          import requests
          from bs4 import BeautifulSoup
          import json
          import datetime
          import re

          regions = ["hokkaido", "tohoku", "tokyo", "chubu", "hokuriku", "kansai", "chugoku", "shikoku", "kyushu"] 
          all_data = []

          for r in regions:
              try:
                  url = f"https://kankyo-ichiba.jp/{r}"
                  res = requests.get(url, headers={'User-Agent': 'Mozilla/5.0'}, timeout=10)
                  soup = BeautifulSoup(res.text, 'html.parser')
                  
                  # Find the text "全時間帯の平均単価" and get the number next to it
                  page_text = soup.get_text()
                  match = re.search(r'全時間帯の平均単価\s+([\d.]+)', page_text)
                  
                  if match:
                      val = float(match.group(1))
                  else:
                      # Fallback search for any yen price in the summary area
                      summary = soup.find('div', class_='area-price-summary')
                      val = float(re.search(r'[\d.]+', summary.text).group()) if summary else 0.0
              except Exception as e:
                  print(f"Error on {r}: {e}")
                  val = 0.0
              
              all_data.append({"area": r.capitalize(), "avg_price": val, "unit": "JPY/kWh"})

          output = {
              "last_updated": datetime.datetime.now().strftime("%Y-%m-%d %H:%M:%S UTC"),
              "data_source": "Kankyo-Ichiba Actual Market Prices",
              "regions": all_data
          }

          with open('data.json', 'w') as f:
              json.dump(output, f, indent=2)
          EOF

      - name: Push to Gist
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          CONTENT=$(cat data.json | python3 -c "import json,sys; print(json.dumps(sys.stdin.read()))")
          curl -L -X PATCH \
            -H "Authorization: Bearer $GIST_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/gists/959b168e741d4df3e091b8b841365476" \
            -d "{\"files\":{\"hokkaido.json\":{\"content\":$CONTENT}}}"
