name: Live Hourly Energy Scraper
on:
  schedule:
    - cron: "0 * * * *" 
  workflow_dispatch: 

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Scraper Tools
        run: pip install requests beautifulsoup4

      - name: Run Hourly Scraper
        run: |
          python - <<EOF
          import requests
          from bs4 import BeautifulSoup
          import json
          import datetime
          import re

          regions = ["hokkaido", "tohoku", "tokyo", "chubu", "hokuriku", "kansai", "chugoku", "shikoku", "kyushu"]
          all_data = []
          headers = {'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'}

          for r in regions:
              try:
                  url = f"https://kankyo-ichiba.jp/{r}"
                  res = requests.get(url, headers=headers, timeout=15)
                  soup = BeautifulSoup(res.text, 'html.parser')
                  
                  # 1. Improved Average Price Search
                  avg_val = 0.0
                  # Look for the specific 'total-average' dl or any text with '平均単価'
                  avg_tag = soup.find(['dl', 'div'], class_=re.compile(r'average|price', re.I))
                  if avg_tag:
                      numbers = re.findall(r'\d+\.\d+|\d+', avg_tag.text)
                      if numbers: avg_val = float(numbers[0])

                  # 2. Universal Table Search
                  hourly_list = []
                  # Find all tables and look for ones that contain time-like patterns (00:00 or 0時)
                  tables = soup.find_all('table')
                  for table in tables:
                      rows = table.find_all('tr')
                      for row in rows:
                          cols = row.find_all(['td', 'th'])
                          if len(cols) >= 2:
                              text = cols[0].text.strip()
                              # If the row looks like a time (contains numbers or '時')
                              if re.search(r'\d', text):
                                  price_text = cols[1].text.strip().replace('円', '').replace(',', '')
                                  try:
                                      price_val = float(re.findall(r'\d+\.\d+|\d+', price_text)[0])
                                      hourly_list.append({"time": text, "price": price_val})
                                  except:
                                      continue
                  
                  if hourly_list:
                      all_data.append({
                          "area": r.capitalize(),
                          "daily_avg": avg_val if avg_val > 0 else (sum(d['price'] for d in hourly_list)/len(hourly_list)),
                          "hourly_data": hourly_list
                      })
                      print(f"Captured {r}")
              except Exception as e:
                  print(f"Error on {r}: {e}")
              
          output = {
              "last_updated": datetime.datetime.now().strftime("%Y-%m-%d %H:%M:%S UTC"),
              "regions": all_data
          }

          with open('data.json', 'w') as f:
              json.dump(output, f, indent=2)
          EOF

      - name: Push to Gist
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          CONTENT=$(cat data.json | python3 -c "import json,sys; print(json.dumps(sys.stdin.read()))")
          curl -L -X PATCH \
            -H "Authorization: Bearer $GIST_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/gists/959b168e741d4df3e091b8b841365476" \
            -d "{\"files\":{\"hokkaido.json\":{\"content\":$CONTENT}}}"
