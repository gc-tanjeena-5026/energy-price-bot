name: Maira Time-Series API Sync
on:
  schedule:
    - cron: "30 * * * *" 
  workflow_dispatch: 

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Install Dependencies
        run: pip install requests pandas

      - name: Push Data to Maira
        env:
          MAIRA_API_KEY: ${{ secrets.MAIRA_API_KEY }}
          MAIRA_PROJECT_KEY: ${{ secrets.MAIRA_PROJECT_KEY }} # If you have a project key, add it too
          DATASET_ID: "48fa3901-be7a-47d1-824c-e700177570ad"
        run: |
          python - <<EOF
          import requests
          import pandas as pd
          import io
          import os

          # 1. Fetch JEPX Data
          url = "https://www.jepx.jp/market/excel/spot_2026.csv"
          df = pd.read_csv(url, encoding='shift_jis')
          
          # 2. Format today's data
          latest = df.tail(48).copy()
          def to_iso(row):
              d, s = row.iloc[0].replace('/', '-'), int(row.iloc[1])
              return f"{d}T{(s-1)//2:02}:{'00' if s%2!=0 else '30'}:00Z"

          latest['timestamp'] = latest.apply(to_iso, axis=1)
          
          # Ensure columns match your registration (timestamp must be present)
          final_df = pd.DataFrame({
              "timestamp": latest['timestamp'],
              "tokyo": latest.iloc[:, 11].astype(float),
              "kansai": latest.iloc[:, 14].astype(float)
          })

          # 3. Create CSV in memory
          csv_file = io.BytesIO()
          final_df.to_csv(csv_file, index=False)
          csv_file.seek(0)

          # 4. Push to Maira Time-Series Endpoint
          api_url = f"https://api.recommender.gigalogy.com/v1/gpt/datasets_ts/{os.environ['DATASET_ID']}/file"
          headers = {
              "api-key": os.environ['MAIRA_API_KEY'],
              "project-key": os.environ.get('MAIRA_PROJECT_KEY', '') # Add if required by your project
          }
          
          files = {'dataset_file': ('data.csv', csv_file, 'text/csv')}
          response = requests.put(api_url, headers=headers, files=files)
          
          print(f"Status: {response.status_code}")
          print(f"Response: {response.text}")
          EOF
