name: Maira Time-Series API Sync
on:
  schedule:
    - cron: "20 * * * *" # Runs at 20 minutes past the hour
  workflow_dispatch: 

jobs:
  sync-to-maira:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests pandas

      - name: Fetch and Push Data
        env:
          MAIRA_API_KEY: ${{ secrets.MAIRA_API_KEY }}
          MAIRA_DATASET_ID: ${{ secrets.MAIRA_DATASET_ID }}
        run: |
          python - <<EOF
          import requests
          import pandas as pd
          import io
          import os

          # 1. DOWNLOAD JEPX RAW DATA
          url = "https://www.jepx.jp/market/excel/spot_2026.csv"
          df = pd.read_csv(url, encoding='shift_jis')
          
          # 2. FORMAT FOR TIME-SERIES
          # We take the last 48 records (latest 24 hours)
          latest_data = df.tail(48).copy()
          
          def get_iso_time(row):
              date_part = row.iloc[0].replace('/', '-')
              slot = int(row.iloc[1])
              h = (slot - 1) // 2
              m = "00" if slot % 2 != 0 else "30"
              return f"{date_part}T{h:02}:{m}:00Z"

          latest_data['timestamp'] = latest_data.apply(get_iso_time, axis=1)
          
          # 3. SELECT REGIONS (Example: Tokyo is col index 11, Kansai is 14)
          # Ensure column names match what you set in Maira's Dataset schema
          final_df = pd.DataFrame({
              "timestamp": latest_data['timestamp'],
              "tokyo": latest_data.iloc[:, 11].astype(float),
              "kansai": latest_data.iloc[:, 14].astype(float)
          })

          # 4. CONVERT TO CSV BUFFER
          csv_buffer = io.StringIO()
          final_df.to_csv(csv_buffer, index=False)
          
          # 5. API CALL TO MAIRA
          dataset_id = os.environ['MAIRA_DATASET_ID']
          api_url = f"https://api.recommender.gigalogy.com/v1/gpt/datasets_ts/{dataset_id}/file"
          headers = {"Authorization": f"Bearer {os.environ['MAIRA_API_KEY']}"}
          
          files = {'file': ('energy_data.csv', csv_buffer.getvalue())}
          response = requests.put(api_url, headers=headers, files=files)
          
          if response.status_code == 200:
              print("Successfully pushed to Maira Time-Series API!")
          else:
              print(f"Error {response.status_code}: {response.text}")
          EOF
