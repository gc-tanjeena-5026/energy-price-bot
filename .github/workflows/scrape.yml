name: JEPX Raw Data Sync
on:
  schedule:
    - cron: "15 * * * *" # Runs every hour at :15
  workflow_dispatch: 

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Download and Process JEPX Data
        run: |
          python - <<EOF
          import requests
          import pandas as pd
          import json
          from datetime import datetime

          # The official JEPX spot price file for 2026
          url = "https://www.jepx.jp/market/excel/spot_2026.csv"
          regions = ["Hokkaido", "Tohoku", "Tokyo", "Chubu", "Hokuriku", "Kansai", "Chugoku", "Shikoku", "Kyushu"]
          
          try:
              # Download the CSV (encoded in Shift-JIS because it's a Japanese file)
              df = pd.read_csv(url, encoding='shift_jis')
              
              # Get the most recent date available in the file
              latest_date = df.iloc[-1]['年月日']
              today_data = df[df['年月日'] == latest_date]
              
              all_regions = []
              for region in regions:
                  # Column names in JEPX are like "エリア値段北海道(円/kWh)"
                  col_name = f"エリア値段{region}(円/kWh)"
                  prices = today_data[col_name].astype(float).tolist()
                  
                  all_regions.append({
                      "area": region,
                      "avg_price": round(sum(prices)/len(prices), 2) if prices else 0,
                      "hourly_data": [{"time": f"{i//2}:{'00' if i%2==0 else '30'}", "price": p} for i, p in enumerate(prices)]
                  })

              output = {
                  "last_updated": datetime.now().strftime("%Y-%m-%d %H:%M:%S"),
                  "date_scraped": str(latest_date),
                  "regions": all_regions
              }
              
              with open('data.json', 'w') as f:
                  json.dump(output, f, indent=2)
              print("Data processing successful")

          except Exception as e:
              print(f"Critical Error: {e}")
          EOF

      - name: Update Gist
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          CONTENT=$(cat data.json | python3 -c "import json,sys; print(json.dumps(sys.stdin.read()))")
          curl -L -X PATCH \
            -H "Authorization: Bearer $GIST_TOKEN" \
            "https://api.github.com/gists/959b168e741d4df3e091b8b841365476" \
            -d "{\"files\":{\"hokkaido.json\":{\"content\":$CONTENT}}}"
